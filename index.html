<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seminar Report Generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow muted">Seminar Report Generator</p>
        <h1>Seminar Report Workflow</h1>
        <p class="hero-copy muted">녹음 파일을 업로드하면 전사·요약·PDF/Markdown 생성까지 한 번에 처리합니다.</p>
      </header>

      <section class="card">
        <div class="section-header">
          <span class="section-badge" aria-hidden="true">1</span>
          <h2>작업 제출</h2>
        </div>
        <form id="submit-form">
          <div class="grid two-col">
            <label>
              이름
              <input id="student-name" required placeholder="영문 이름 (예: John Kim)" />
              <small>PDF 렌더링 안정성을 위해 영문/숫자/공백/(_.-)만 허용됩니다.</small>
            </label>
            <label>
              학번
              <input id="student-id" required placeholder="예: 2026012345" />
              <small>입력값은 PDF 안정성을 위해 영문/숫자/공백/(_.-)로만 사용하세요.</small>
            </label>
            <label>
              세미나 날짜
              <input id="seminar-date" type="date" required />
            </label>
            <label>
              OpenAI API Key
              <input id="openai-key" type="password" required placeholder="sk-..." autocomplete="off" />
              <small>키는 브라우저 메모리에만 저장되며, 코드/저장소에 기록되지 않습니다.</small>
            </label>
            <label>
              출력 프리셋
              <select id="output-preset">
                <option value="classic" selected>클래식 · 명확한 항목 구분</option>
                <option value="compact">컴팩트 · 짧고 조밀한 형태</option>
                <option value="academic">아카데믹 · 보고서 톤</option>
              </select>
              <small>선택한 프리셋은 Markdown/PDF 양쪽에 동시에 적용됩니다.</small>
            </label>
            <label>
              요약 모델
              <select id="summary-model">
                <option value="gpt-5.2" selected>gpt-5.2 (최신 고정밀/권장)</option>
                <option value="gpt-5.2-codex">gpt-5.2-codex (코드 특화)</option>
                <option value="gpt-5.1">gpt-5.1 (고정밀)</option>
                <option value="gpt-5-mini">gpt-5-mini (빠른 요약)</option>
                <option value="gpt-5-nano">gpt-5-nano (저비용)</option>
                <option value="gpt-4.1">gpt-4.1 (균형)</option>
                <option value="gpt-4.1-mini">gpt-4.1-mini (저지연)</option>
                <option value="gpt-4.1-nano">gpt-4.1-nano (초저비용)</option>
                <option value="gpt-4o-mini">gpt-4o-mini (범용 저비용)</option>
                <option value="o4-mini">o4-mini (추론 효율형)</option>
              </select>
              <small>선택한 요약 모델은 Responses API의 요약 단계에 적용됩니다.</small>
            </label>
          </div>
            <label>
              녹음 파일
              <input
                id="audio-file"
                type="file"
                accept=".m4a,.mp3,.wav,.ogg,.flac,.aac,.opus,.webm,.mp4,.mov,.m4v,.avi,.mkv,.3gp,.wma,.oga,.ogv,.mp4a"
                required
              />
              <small>지원 확장자: m4a, mp3, wav, ogg, flac, aac, opus, webm, mp4, mov, m4v 등. 25MB 초과는 자동 분할, 50MB 초과는 업로드 제한입니다. 일부 m4a 코덱은 브라우저 분할 전사에서 디코딩 실패할 수 있어, 대용량 파일은 WAV/MP3를 권장합니다.</small>
            </label>
          <div class="actions">
            <button type="submit" id="submit-btn">업로드 및 처리 시작</button>
            <button type="button" id="clear-form-btn">입력 초기화</button>
          </div>
        </form>
        <p id="form-error" class="error"></p>
      </section>

      <section class="layout">
        <article class="card">
          <div class="section-header">
            <span class="section-badge" aria-hidden="true">2</span>
            <h2>진행 상태</h2>
          </div>
          <div id="jobs-list" class="jobs"></div>
        </article>

        <article class="card">
          <div class="section-header">
            <span class="section-badge" aria-hidden="true">3</span>
            <h2>실시간 모니터</h2>
          </div>
          <div id="live-title" class="muted">실행 중인 job이 없습니다.</div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div id="live-progress" class="progress-fill"></div>
            </div>
            <div id="live-meta" class="muted"></div>
          </div>
          <div id="live-console" class="console console-timeline"></div>
        </article>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="./app.js?v=20260313-12"></script>
  </body>
</html>
